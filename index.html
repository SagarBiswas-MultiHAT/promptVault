<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>PromptVault — Your Private AI Prompt Library</title>
    <meta name="description" content="A private, offline-first prompt manager for organizing, evaluating, and deploying AI prompts across any workflow. Secure, fast, and beautiful." />
    <meta name="keywords" content="prompt manager, AI prompts, prompt library, prompt engineering, ChatGPT prompts, offline prompt vault, AI prompt organizer, prompt template manager" />
    <meta name="author" content="PromptVault" />
    <meta name="theme-color" content="#08090A" />
    <meta name="color-scheme" content="dark light" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://promptvault.multihat.dev/" />
    <meta property="og:title" content="PromptVault — Your Private AI Prompt Library" />
    <meta property="og:description" content="A private, offline-first prompt manager for organizing, evaluating, and deploying AI prompts across any workflow." />
    <meta property="og:image" content="https://promptvault.multihat.dev/og-image.png" />
    <meta property="og:site_name" content="PromptVault" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@SagarBiswasMH" />
    <meta name="twitter:title" content="PromptVault — Your Private AI Prompt Library" />
    <meta name="twitter:description" content="A private, offline-first prompt manager for organizing, evaluating, and deploying AI prompts across any workflow." />
    <meta name="twitter:image" content="https://promptvault.multihat.dev/og-image.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://promptvault.multihat.dev/" />

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="512x512" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/logo.png" />

    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PromptVault" />

    <!-- Critical CSS — inlined for instant first paint without waiting for external stylesheet -->
    <style>
      :root{--v-bg:#08090A;--v-panel:#111214;--v-panel-bright:#1A1C20;--v-border:#252830;--v-text:#EAEDF3;--v-muted:#9CA3AF}
      .light{--v-bg:#F8F9FB;--v-panel:#FFFFFF;--v-panel-bright:#F3F4F6;--v-border:#E5E7EB;--v-text:#111827;--v-muted:#6B7280}
      html,body{margin:0;padding:0;overflow-x:hidden}
      body{background:var(--v-bg);color:var(--v-text);font-family:"Inter",ui-sans-serif,system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
      #root{min-height:100vh}
      .shell-flex{display:flex;height:100vh;background:var(--v-bg);color:var(--v-text)}
      .shell-sidebar{width:280px;background:var(--v-panel);border-right:1px solid var(--v-border);flex-shrink:0}
      .shell-main{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column}
      .shell-text{font-size:14px;color:var(--v-muted);max-width:22rem;text-align:center;line-height:1.6}
      .flex{display:flex}
      .flex-col{flex-direction:column}
      .items-center{align-items:center}
      .justify-center{justify-content:center}
      .py-28{padding-top:7rem;padding-bottom:7rem}
      .space-y-8> :not([hidden])~ :not([hidden]){margin-top:2rem}
      .space-y-2> :not([hidden])~ :not([hidden]){margin-top:0.5rem}
      .text-center{text-align:center}
      .relative{position:relative}
      .absolute{position:absolute}
      .inset-0{top:0;right:0;bottom:0;left:0}
      .w-32{width:8rem}
      .h-32{height:8rem}
      .w-20{width:5rem}
      .h-20{height:5rem}
      .w-6{width:1.5rem}
      .h-6{height:1.5rem}
      .w-4{width:1rem}
      .h-4{height:1rem}
      .w-3{width:0.75rem}
      .h-3{height:0.75rem}
      .top-0{top:0}
      .right-2{right:0.5rem}
      .bottom-2{bottom:0.5rem}
      .left-0{left:0}
      .top-4{top:1rem}
      .left-3{left:0.75rem}
      .rounded-2xl{border-radius:1rem}
      .rounded-lg{border-radius:0.5rem}
      .rounded-md{border-radius:0.375rem}
      .rounded-full{border-radius:9999px}
      .border{border:1px solid var(--v-border)}
      .max-w-sm{max-width:24rem}
      .font-bold{font-weight:700}
      .tracking-tight{letter-spacing:-0.01em}
      .leading-relaxed{line-height:1.625}
      .gap-2{gap:0.5rem}
      .text-vault-text-muted{color:var(--v-muted)}
      .bg-vault-panel\/50{background:color-mix(in srgb, var(--v-panel) 50%, transparent)}
      .bg-vault-accent\/5{background:rgba(245, 158, 11, 0.05)}
      .bg-vault-accent-blue\/5{background:rgba(99, 102, 241, 0.05)}
      .bg-emerald-500\/5{background:rgba(16, 185, 129, 0.05)}
      .border-vault-accent\/20{border-color:rgba(245, 158, 11, 0.2)}
      .border-vault-accent-blue\/20{border-color:rgba(99, 102, 241, 0.2)}
      .border-emerald-500\/20{border-color:rgba(16, 185, 129, 0.2)}
      .btn-primary{display:inline-flex;align-items:center;justify-content:center;background:#f59e0b;border:0;border-radius:9999px;cursor:not-allowed;opacity:0.95}
      .\!rounded-full{border-radius:9999px}
      .\!px-8{padding-left:2rem;padding-right:2rem}
      @media(max-width:768px){.shell-sidebar{display:none}}
    </style>

    <!-- Preconnect & Fonts — loaded non-blocking to avoid mobile render delay -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=optional" media="print" data-fonts />

    <!-- __CSS_PRELOAD__ -->

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "PromptVault",
      "url": "https://promptvault.multihat.dev/",
      "description": "A private, offline-first prompt manager for organizing, evaluating, and deploying AI prompts across any workflow. Secure, fast, and beautiful.",
      "applicationCategory": "ProductivityApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Offline-first prompt storage",
        "AI-powered prompt analysis and improvement",
        "PIN-protected encrypted vault",
        "Cloud sync via Supabase",
        "Category organization",
        "Variable template system",
        "Import/Export functionality"
      ],
      "screenshot": "https://promptvault.multihat.dev/og-image.png",
      "softwareVersion": "1.0.0",
      "creator": {
        "@type": "Organization",
        "name": "PromptVault"
      }
    }
    </script>

    <!-- Google Analytics 4 — loaded after page is interactive to avoid blocking FCP/LCP -->
    <script defer src="/gtag-init.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="max-width: 600px; margin: 80px auto; padding: 40px; font-family: system-ui, sans-serif; text-align: center; color: #EAEDF3; background: #111214; border-radius: 16px; border: 1px solid #252830;">
        <h1 style="font-size: 24px; margin-bottom: 16px;">PromptVault</h1>
        <p style="color: #6B7280; line-height: 1.6;">
          PromptVault is a private, offline-first AI prompt manager for organizing, evaluating, and deploying prompts across any workflow.
          Features include AI-powered prompt analysis, PIN-protected encrypted storage, cloud sync, and variable template injection.
        </p>
        <p style="color: #6B7280; margin-top: 16px;">
          Please enable JavaScript to use PromptVault.
        </p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
